<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Generator</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .template-item { padding: 8px; cursor: pointer; border-left: 3px solid transparent; }
        .template-item.active { border-left-color: blue; background: #f0f0f0; }
        #editor { height: 300px; border: 1px solid #ccc; }
        .field-chip {
            display: inline-block; margin: 3px; padding: 3px 8px;
            background: #f0f0f0; border: 1px solid #ddd; border-radius: 12px;
        }
    </style>
</head>
<body>
    <h1>PDF Generator</h1>

    <div style="display: flex; gap: 20px;">
        <div style="width: 250px;">
            <h2>Шаблоны</h2>
            <button id="newBtn">+ Новый</button>
            <hr>
            <div id="templateList"></div>
        </div>

        <div style="flex: 1;">
            <input type="text" id="tplName" placeholder="Название шаблона" style="font-size: 18px; width: 300px;">
            <span id="tplId"></span>

            <div style="margin: 10px 0;">
                <button id="saveBtn">Сохранить</button>
                <button id="previewBtn">Предпросмотр</button>
                <button id="downloadBtn">Скачать PDF</button>
                <button id="deleteBtn">Удалить</button>
            </div>

            <div id="editor"></div>
            <p>Маркеры: <code>{value}</code></p>

            <div style="margin: 10px 0; padding: 10px; border: 1px solid #eee;">
                <h3>Поля</h3>
                <input type="text" id="fieldName" placeholder="Имя поля">
                <input type="text" id="fieldValue" placeholder="Значение">
                <button id="addFieldBtn">Добавить</button>
                <div id="fieldsList" style="margin-top: 10px;"></div>
            </div>

            <div style="margin: 10px 0; padding: 10px; border: 1px solid #eee;">
                <h3>Предпросмотр</h3>
                <button id="refreshPreviewBtn">Обновить</button>
                <span id="previewStatus"></span>
                <div id="previewContent" style="margin-top: 10px; min-height: 200px; border: 1px dashed #ccc; padding: 10px;">
                    Сохраните шаблон и добавьте поля
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="module" src="/static/app.js"></script>
</body>
</html>
